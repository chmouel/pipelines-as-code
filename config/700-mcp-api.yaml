apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipelines-as-code-mcp-api
  namespace: pipelines-as-code
  labels:
    app.kubernetes.io/name: pipelines-as-code-mcp-api
    app.kubernetes.io/component: mcp-api
    app.kubernetes.io/part-of: pipelines-as-code
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pipelines-as-code-mcp-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pipelines-as-code-mcp-api
        app.kubernetes.io/component: mcp-api
        app.kubernetes.io/part-of: pipelines-as-code
    spec:
      serviceAccountName: pipelines-as-code-mcp-api
      containers:
        - name: mcp-api
          image: ${PAC_MCP_API_IMAGE}
          imagePullPolicy: Always
          ports:
            - containerPort: 8090
              name: api
          resources:
            limits:
              cpu: 500m
              memory: 500Mi
            requests:
              cpu: 100m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: api
              scheme: HTTP
            periodSeconds: 15
            successThreshold: 1
            timeoutSeconds: 1
          readinessProbe:
            httpGet:
              path: /health
              port: api
              scheme: HTTP
            periodSeconds: 15
            successThreshold: 1
            timeoutSeconds: 1
---
apiVersion: v1
kind: Service
metadata:
  name: pipelines-as-code-mcp-api
  namespace: pipelines-as-code
  labels:
    app.kubernetes.io/name: pipelines-as-code-mcp-api
    app.kubernetes.io/component: mcp-api
    app.kubernetes.io/part-of: pipelines-as-code
spec:
  type: ClusterIP
  ports:
    - name: api
      port: 8090
      protocol: TCP
      targetPort: api
  selector:
    app.kubernetes.io/name: pipelines-as-code-mcp-api
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipelines-as-code-mcp-api
  namespace: pipelines-as-code
  labels:
    app.kubernetes.io/name: pipelines-as-code-mcp-api
    app.kubernetes.io/component: mcp-api
    app.kubernetes.io/part-of: pipelines-as-code
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: pipelines-as-code-mcp-api
  labels:
    app.kubernetes.io/name: pipelines-as-code-mcp-api
    app.kubernetes.io/component: mcp-api
    app.kubernetes.io/part-of: pipelines-as-code
rules:
  # Access to Repository CRs
  - apiGroups:
      - pipelinesascode.tekton.dev
    resources:
      - repositories
    verbs:
      - get
      - list
      - watch
  # Access to Tekton PipelineRuns and TaskRuns
  - apiGroups:
      - tekton.dev
    resources:
      - pipelineruns
      - taskruns
    verbs:
      - get
      - list
      - watch
  # Access to Pod logs
  - apiGroups:
      - ""
    resources:
      - pods
      - pods/log
    verbs:
      - get
      - list
      - watch
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: pipelines-as-code-mcp-api
  labels:
    app.kubernetes.io/name: pipelines-as-code-mcp-api
    app.kubernetes.io/component: mcp-api
    app.kubernetes.io/part-of: pipelines-as-code
subjects:
  - kind: ServiceAccount
    name: pipelines-as-code-mcp-api
    namespace: pipelines-as-code
roleRef:
  kind: ClusterRole
  name: pipelines-as-code-mcp-api
  apiGroup: rbac.authorization.k8s.io
