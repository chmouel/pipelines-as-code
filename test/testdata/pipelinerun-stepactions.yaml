---
apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  name: "\\ .PipelineName //"
  annotations:
    pipelinesascode.tekton.dev/target-namespace: "\\ .TargetNamespace //"
    pipelinesascode.tekton.dev/on-target-branch: "[\\ .TargetBranch //]"
    pipelinesascode.tekton.dev/on-event: "[\\ .TargetEvent //]"
spec:
  pipelineSpec:
    tasks:
      - name: stepactions-task
        taskSpec:
          steps:
            - name: step-1
              ref:
                resolver: http
                params:
                  - name: url
                    value: https://raw.githubusercontent.com/pipelines-as-code/catalog/b69fb7f82f229e818309ed861d1ab4f43e077fd6/stepactions/test/0.1/test.yaml
            - name: step-2
              ref:
                resolver: http
                params:
                  - name: url
                    value: https://raw.githubusercontent.com/pipelines-as-code/catalog/b69fb7f82f229e818309ed861d1ab4f43e077fd6/stepactions/test/0.1/test.yaml
              params:
                - name: exit
                  value: "1"
            - name: step-3
              ref:
                resolver: http
                params:
                  - name: url
                    value: https://raw.githubusercontent.com/pipelines-as-code/catalog/b69fb7f82f229e818309ed861d1ab4f43e077fd6/stepactions/test/0.1/test.yaml
