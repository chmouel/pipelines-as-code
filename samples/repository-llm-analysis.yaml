# Simple Repository CRD with LLM Analysis Configuration
# This demonstrates a minimal setup for AI-powered pipeline failure analysis

apiVersion: pipelinesascode.tekton.dev/v1alpha1
kind: Repository
metadata:
  name: my-repo-with-ai
  namespace: default
spec:
  url: "https://github.com/example/my-project"

  settings:
    # Simple AI Analysis Configuration
    ai_analysis:
      enabled: true
      provider: "openai" # or "gemini"
      secret_ref: "openai-api-key"

      # Optional: Custom prompt (uses sensible default if not provided)
      # prompt: |
      #   You are a DevOps expert. Analyze this failed pipeline and provide:
      #   1. Root cause of the failure
      #   2. Specific steps to fix it
      #   3. Prevention recommendations

      # Optional: Analyze all pipeline runs, not just failures (default: true for failures only)
      # on_failure_only: false

---
# Secret containing the OpenAI API key
apiVersion: v1
kind: Secret
metadata:
  name: openai-api-key
  namespace: default
type: Opaque
data:
  # Base64 encoded OpenAI API key: echo -n "sk-your-api-key" | base64
  token: c2stWW91ck9wZW5BSUFQSUtleUhlcmU=

---
# Alternative example with Google Gemini
apiVersion: pipelinesascode.tekton.dev/v1alpha1
kind: Repository
metadata:
  name: my-repo-with-gemini
  namespace: default
spec:
  url: "https://github.com/example/gemini-project"

  settings:
    ai_analysis:
      enabled: true
      provider: "gemini"
      secret_ref: "gemini-api-key"

---
# Secret for Google Gemini API
apiVersion: v1
kind: Secret
metadata:
  name: gemini-api-key
  namespace: default
type: Opaque
data:
  # Base64 encoded Gemini API key: echo -n "your-gemini-key" | base64
  token: WW91ckdlbWluaUFQSUtleUhlcmU=
